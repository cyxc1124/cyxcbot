name: Build Windows Executable

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    name: Build Windows Package
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version metadata
        id: version
        shell: bash
        run: |
          GIT_COMMIT=$(git rev-parse HEAD)
          GIT_BRANCH=${GITHUB_REF#refs/heads/}
          GIT_TAG=""
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_NUMBER=${{ github.run_number }}

          if [[ $GITHUB_REF == refs/tags/* ]]; then
            GIT_TAG=${GITHUB_REF#refs/tags/}
            GIT_BRANCH=""
            VERSION=${GIT_TAG}
          else
            VERSION="${GIT_BRANCH}-${GIT_COMMIT:0:8}"
          fi

          echo "git-commit=${GIT_COMMIT}" >> $GITHUB_OUTPUT
          echo "git-branch=${GIT_BRANCH}" >> $GITHUB_OUTPUT
          echo "git-tag=${GIT_TAG}" >> $GITHUB_OUTPUT
          echo "build-time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "build-number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          echo "Version: ${VERSION}"
          echo "Git Commit: ${GIT_COMMIT:0:8}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Windows package
        shell: pwsh
        env:
          GIT_COMMIT: ${{ steps.version.outputs.git-commit }}
          GIT_TAG: ${{ steps.version.outputs.git-tag }}
          GIT_BRANCH: ${{ steps.version.outputs.git-branch }}
          BUILD_TIME: ${{ steps.version.outputs.build-time }}
          BUILD_NUMBER: ${{ steps.version.outputs.build-number }}
        run: ./scripts/build-windows.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyxcbot-windows-${{ steps.version.outputs.version }}
          path: cyxcbot-windows-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: cyxcbot-windows-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Build Summary
        shell: bash
        run: |
          {
            echo "## Windows 构建完成"
            echo ""
            echo "### 版本信息"
            echo "- **Version**: ${{ steps.version.outputs.version }}"
            echo "- **Git Tag**: ${{ steps.version.outputs.git-tag }}"
            echo "- **Git Branch**: ${{ steps.version.outputs.git-branch }}"
            echo "- **Git Commit**: ${{ steps.version.outputs.git-commit }}"
            echo "- **Build Time**: ${{ steps.version.outputs.build-time }}"
            echo ""
            echo "### 产物"
            echo "- \`cyxcbot-windows-${{ steps.version.outputs.version }}.zip\`"
            echo "- 解压后运行 \`cyxcbot.exe\`，首次使用请复制 \`env.example\` 为 \`.env\` 并修改配置"
          } >> "$GITHUB_STEP_SUMMARY"
