{{- /* 方式 B：secret.name 为空且 secret.value 有值时，Chart 创建 Secret（key 见 values.secret.key） */ -}}
{{- if and (not .Values.secret.name) .Values.secret.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cyxcbot.fullname" . }}-secret
  labels:
    {{- include "cyxcbot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.key }}: {{ .Values.secret.value | quote }}
{{- end }}
